name: Publish backend Docker image to GHCR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -f ICR.API/Dockerfile -t ghcr.io/${{ github.repository_owner }}/icr.gestao_de_secretaria_api:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/icr.gestao_de_secretaria_api:latest
