services:
  icr_db:
    image: postgres:16
    container_name: icr_db
    environment:
      POSTGRES_DB: icr_connect
      POSTGRES_USER: icradmin
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - icr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icradmin -d icr_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

  icr.api:
    image: ghcr.io/davifigueiracarvalho/icr.gestao_de_secretaria_api:latest
    container_name: icr_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=icr_db;Port=5432;Database=icr_connect;Username=icradmin;Password=root
      JWT_KEY: KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      ROOTUSERNAME: federacao_root
      ROOTPASSWORD: Federação@25
    depends_on:
      icr_db:
        condition: service_healthy
    networks:
      - icr-net

  icr.frontend:
    image: icr-gestao-secretaria-fe:latest
    container_name: icr_frontend
    ports:
      - "3000:80"
    depends_on:
      - icr.api
    networks:
      - icr-net

networks:
  icr-net:
    driver: bridge
