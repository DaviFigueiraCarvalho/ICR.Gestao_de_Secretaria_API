services:
  icr_db:
    image: postgres:16
    container_name: icr_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-icr_connect}
      POSTGRES_USER: ${POSTGRES_USER:-icradmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icradmin} -d ${POSTGRES_DB:-icr_connect}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - icr-net

  icr.api:
    image: ghcr.io/davifigueiracarvalho/icr.gestao_de_secretaria_api:latest
    container_name: icr_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=icr_db;Port=5432;Database=icr_connect;Username=icradmin;Password=root}
      JWT_KEY: ${JWT_KEY:-dev-only-jwt-secret-key-minimum-32-chars!}
      ROOTUSERNAME: ${ROOTUSERNAME:-admin}
      ROOTPASSWORD: ${ROOTPASSWORD:-admin123}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      icr_db:
        condition: service_healthy
    networks:
      - icr-net

  icr.fe:
    image: ghcr.io/davifigueiracarvalho/icr-gestao-secretaria-fe:latest
    container_name: icr_fe
    ports:
      - "3000:3000"
    depends_on:
      - icr.api
    networks:
      - icr-net


networks:
  icr-net:
    driver: bridge
