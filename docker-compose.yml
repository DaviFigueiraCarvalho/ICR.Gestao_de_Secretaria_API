services:
  icr_db:
    image: postgres:16
    container_name: icr_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-icr_connect}
      POSTGRES_USER: ${POSTGRES_USER:-icradmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    # Exponha 5432 publicamente apenas se precisar acessar o banco fora da VPS.
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icradmin} -d ${POSTGRES_DB:-icr_connect}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - icr-net

  icr.api:
    image: ghcr.io/davifigueiracarvalho/icr.gestao_de_secretaria_api:latest
    pull_policy: always
    container_name: icr_api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      # Em produção, avalie controlar o Swagger por configuração segura.
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=icr_db;Port=5432;Database=icr_connect;Username=icradmin;Password=root}
      JWT_KEY: ${JWT_KEY:-dev-only-jwt-secret-key-minimum-32-chars!}
      ROOTUSERNAME: ${ROOTUSERNAME:-admin}
      ROOTPASSWORD: ${ROOTPASSWORD:-admin123}
      Cors__AllowedOrigins__0: https://app.${DOMAIN_NAME:-localhost}
      BASE_DOMAIN: ${DOMAIN_NAME:-localhost}
    depends_on:
      icr_db:
        condition: service_healthy
    networks:
      - icr-net

  icr.fe:
    image: ghcr.io/davifigueiracarvalho/icr-gestao-secretaria-fe:latest
    pull_policy: always
    container_name: icr_fe
    expose:
      - "3000"
    depends_on:
      - icr.api
    networks:
      - icr-net

  caddy:
    image: caddy:alpine
    container_name: icr_caddy
    profiles:
      - production
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - icr.api
      - icr.fe
    networks:
      - icr-net


networks:
  icr-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
